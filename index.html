<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MENU</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:rgb(221, 101, 101);
      padding:20px;
    }

    .container{
      width:100%;
      max-width:1200px;
      text-align:center;
    }

    h1{
      font-size:3rem;
      margin-bottom:50px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:30px;
    }

    .card{
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius:20px;
      padding:30px;
      transition:0.3s;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 20px 40px rgba(0,0,0,0.4);
    }

    .icon{
      font-size:60px;
      margin-bottom:20px;
    }

    .card h2{
      margin-bottom:15px;
      font-size:1.8rem;
    }

    .card p{
      color:#cbd5e1;
      margin-bottom:25px;
      line-height:1.5;
    }

    .btn{
      display:inline-block;
      padding:12px 25px;
      background:#3b82f6;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.3s;
      font-weight:bold;
    }

    .btn:hover{
      background:#2563eb;
      transform:scale(1.05);
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>BUSQUEDAS</h1>

    <div class="cards">

      <div class="card">
        
        <h2>Busqueda 1</h2>
        <p>
          Carretera UCS
        </p>

        <a class="btn"
           href="https://busqueda1.onrender.com/"
           target="_blank">
          Resultado
        </a>
      </div>

      <div class="card">
        
        <h2>Busqueda 2</h2>
        <p>
          Vuelos_BFS
        </p>

        <a class="btn"
           href="https://vuelos-bfs-wlyw.onrender.com/"
           target="_blank">
          Resultado
        </a>
      </div>

      <div class="card">
        <div class="icon"></div>
        <h2>Busuqeda  3</h2>
        <p>
          Puzzle DFS
        </p>

        <a class="btn"
           href="https://dfs-eajz.onrender.com/"
           target="_blank">
          Resultado
        </a>
      </div>

    </div>

  </div>

</body>
</html>
